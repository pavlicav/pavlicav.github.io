<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Metro Coverage Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #map {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
  }

  .leaflet-tile-pane { filter: saturate(0.25) brightness(0.75) contrast(1.05); }

  #legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 1000;
    background: rgba(10, 10, 18, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 22px;
    font-size: 13px;
    min-width: 170px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #legend h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 14px;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    padding: 3px 4px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .legend-row:hover { background: rgba(255,255,255,0.06); }
  .legend-row.disabled { opacity: 0.25; }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }

  .legend-label { font-weight: 500; font-size: 13px; }

  #info {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 1000;
    background: rgba(10, 10, 18, 0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 22px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #info h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  #info p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-family: 'JetBrains Mono', monospace;
  }

  #tooltip {
    position: fixed;
    z-index: 2000;
    background: rgba(10, 10, 18, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    pointer-events: none;
    display: none;
    font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    max-width: 220px;
  }

  #tooltip .station-name { font-weight: 700; margin-bottom: 2px; }
  #tooltip .station-line {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: 'JetBrains Mono', monospace;
  }

  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>
<div id="info">
  <h1>WMATA Coverage</h1>
  <p>Voronoi regions by nearest station</p>
</div>
<div id="legend"><h3>Metro Lines</h3></div>
<div id="tooltip">
  <div class="station-name"></div>
  <div class="station-line"></div>
</div>

<script>

  ["Mt Vernon Sq",38.9050,-77.0219,"Green",["Green","Yellow"]],
  ["Shaw–Howard U",38.9129,-77.0220,"Green",["Green","Yellow"]],
  ["U Street",38.9170,-77.0289,"Green",["Green","Yellow"]],
  ["Columbia Heights",38.9280,-77.0327,"Green",["Green","Yellow"]],
  ["Georgia Ave–Petworth",38.9368,-77.0243,"Green",["Green","Yellow"]],
  ["West Hyattsville",38.9545,-76.9695,"Green",["Green"]],
  ["Hyattsville Crossing",38.9653,-76.9561,"Green",["Green"]],
  ["College Park–U of Md",38.9785,-76.9285,"Green",["Green"]],
  ["Greenbelt",39.0111,-76.9112,"Green",["Green"]],
];

// Generate a unique color per station via golden-angle hue spacing
// so neighboring Voronoi cells always contrast
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

const STATION_COLORS = STATIONS.map((_, i) => {
  const hue = (i * 137.508) % 360;          // golden angle
  const sat = 58 + (i % 3) * 12;            // 58 / 70 / 82
  const lit = 52 + ((i * 7) % 4) * 6;       // 52 / 58 / 64 / 70
  const rgb = hslToRgb(hue, sat, lit);
  const hex = '#' + rgb.map(v => v.toString(16).padStart(2,'0')).join('');
  return { rgb, hex };
});

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const disabledLines = new Set();

// ── Map ──
const map = L.map('map', {
  center: [38.9072, -77.0369],
  zoom: 11,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

// ── Voronoi GridLayer — renders as tiles, moves natively with the map ──
const CELL = 4;
const FADE_START = 800;
const FADE_END = 2400;
const MAX_ALPHA = 0.55;

const VoronoiGrid = L.GridLayer.extend({
  createTile(coords, done) {
    const tile = document.createElement('canvas');
    const size = this.getTileSize();
    tile.width = size.x;
    tile.height = size.y;

    // Offload to rAF so tile creation doesn't block panning
    requestAnimationFrame(() => {
      const ctx = tile.getContext('2d');
      const active = [];
      for (let i = 0; i < STATIONS.length; i++) {
        if (!disabledLines.has(STATIONS[i][3])) active.push(i);
      }
      if (active.length === 0) { done(null, tile); return; }

      const imgData = ctx.createImageData(size.x, size.y);
      const buf = imgData.data;
      const z = coords.z;
      const tileX = coords.x * size.x;
      const tileY = coords.y * size.y;

      for (let py = 0; py < size.y; py += CELL) {
        // Convert this row's y to lat once
        const gY = tileY + py;
        const lat = this._yToLat(gY, z);
        const cosLat = Math.cos(lat * Math.PI / 180);

        for (let px = 0; px < size.x; px += CELL) {
          const gX = tileX + px;
          const lng = this._xToLng(gX, z);

          // Nearest station (squared approx)
          let minD = Infinity, nearestIdx = -1;
          for (let i = 0; i < active.length; i++) {
            const si = active[i];
            const s = STATIONS[si];
            const dlat = lat - s[1];
            const dlng = (lng - s[2]) * cosLat;
            const d = dlat*dlat + dlng*dlng;
            if (d < minD) { minD = d; nearestIdx = si; }
          }
          if (nearestIdx < 0) continue;

          const nearest = STATIONS[nearestIdx];
          const distM = haversine(lat, lng, nearest[1], nearest[2]);
          let alpha;
          if (distM <= FADE_START) alpha = MAX_ALPHA;
          else if (distM >= FADE_END) continue;
          else alpha = MAX_ALPHA * (1 - (distM - FADE_START) / (FADE_END - FADE_START));

          const c = STATION_COLORS[nearestIdx].rgb;
          const a = Math.round(alpha * 255);

          const endY = Math.min(py + CELL, size.y);
          const endX = Math.min(px + CELL, size.x);
          for (let dy = py; dy < endY; dy++) {
            for (let dx = px; dx < endX; dx++) {
              const idx = (dy * size.x + dx) * 4;
              buf[idx]   = c[0];
              buf[idx+1] = c[1];
              buf[idx+2] = c[2];
              buf[idx+3] = a;
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
      done(null, tile);
    });

    return tile;
  },

  _xToLng(x, z) {
    return (x / Math.pow(2, z) / 256) * 360 - 180;
  },

  _yToLat(y, z) {
    const n = Math.PI - 2 * Math.PI * y / (Math.pow(2, z) * 256);
    return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
  }
});

const voronoiLayer = new VoronoiGrid({
  tileSize: 256,
  opacity: 1,
  updateWhenZooming: true,
  updateWhenIdle: false,
  keepBuffer: 4
});
voronoiLayer.addTo(map);

// ── Station markers ──
const stationMarkers = [];
STATIONS.forEach((s, idx) => {
  const color = STATION_COLORS[idx].hex;
  const marker = L.circleMarker([s[1], s[2]], {
    radius: 4, fillColor: color, color: '#fff',
    weight: 1.5, opacity: 0.9, fillOpacity: 1, pane: 'markerPane'
  }).addTo(map);
  marker.stationData = { name: s[0], line: s[3], lines: s[4], idx };
  stationMarkers.push(marker);

  marker.on('mouseover', function(e) {
    const tt = document.getElementById('tooltip');
    tt.querySelector('.station-name').textContent = s[0];
    tt.querySelector('.station-name').style.color = color;
    tt.querySelector('.station-line').textContent = s[4].join(' · ');
    tt.style.display = 'block';
    tt.style.left = (e.containerPoint.x + 16) + 'px';
    tt.style.top = (e.containerPoint.y - 10) + 'px';
    this.setRadius(7);
  });
  marker.on('mouseout', function() {
    document.getElementById('tooltip').style.display = 'none';
    this.setRadius(4);
  });
});

// ── Legend ──
const legendEl = document.getElementById('legend');
Object.entries(LINE_COLORS).forEach(([name, color]) => {
  const row = document.createElement('div');
  row.className = 'legend-row';
  row.innerHTML = `<div class="legend-dot" style="background:${color.hex}"></div><span class="legend-label">${name}</span>`;
  row.addEventListener('click', () => {
    if (disabledLines.has(name)) {
      disabledLines.delete(name);
      row.classList.remove('disabled');
    } else {
      disabledLines.add(name);
      row.classList.add('disabled');
    }
    stationMarkers.forEach(m => {
      if (m.stationData.line === name) {
        m.setStyle({
          opacity: disabledLines.has(name) ? 0 : 0.9,
          fillOpacity: disabledLines.has(name) ? 0 : 1
        });
      }
    });
    voronoiLayer.redraw();
  });
  legendEl.appendChild(row);
});
</script>
